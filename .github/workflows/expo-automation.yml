# .github/workflows/expo-preview.yml
name: Expo CI/CD

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Filter: Detect if changes are JS-only or include native code
  # ─────────────────────────────────────────────────────────────
  filter:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.changes.outputs.native }}
      js: ${{ steps.changes.outputs.js }}
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            native:
              - 'android/**'
              - 'ios/**'
              - 'app.json'
              - 'app.config.js'
              - 'app.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'yarn.lock'
              - 'eas.json'
              - 'expo-plugins/**'
              - 'plugins/**'
            js:
              - 'app/**'
              - 'src/**'
              - 'components/**'
              - 'hooks/**'
              - 'constants/**'
              - 'assets/**'
              - 'scripts/**'
              - '**/*.{js,jsx,ts,tsx}'
              - '**/*.{css,scss,json}'

  # ─────────────────────────────────────────────────────────────
  # Job: Create OTA preview update (JS/TS changes only)
  # ─────────────────────────────────────────────────────────────
  pr-ota-update:
    name: 🚀 OTA Preview Update
    needs: filter
    if: needs.filter.outputs.js == 'true' && needs.filter.outputs.native == 'false'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # Required to comment on PRs
      contents: read

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🔐 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Create preview update with QR comment
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --branch pr-${{ github.event.number }} --message "PR #${{ github.event.number }}"
          comment: |
            ## 🚀 Actualización disponible
      
            {qr}
      
            [Ver actualización]({link})
  # ─────────────────────────────────────────────────────────────
  # Job: Warn when native changes are detected (no auto-build)
  # ─────────────────────────────────────────────────────────────
  pr-native-warning:
    name: ⚠️ Native Changes Warning
    needs: filter
    if: needs.filter.outputs.native == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: ⚠️ Comment PR about native changes
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## ⚠️ **Cambios nativos detectados**

            Se han detectado modificaciones que afectan el código nativo:
            - 📁 `android/`, `ios/`
            - ⚙️ `app.json`, `eas.json`, `package.json`
            - 🔌 Plugins o configuración nativa

            ### 🔧 ¿Qué hacer ahora?

            **Para probar localmente:**
            ```bash
            # Opción recomendada: Build local (no consume cuota de EAS)
            eas build --profile development --platform android --local

            # Opción alternativa: Build en la nube de EAS (consume minutos)
            npm run build:dev
            ```

            **Para release a producción:**
            Solo el **Tech Lead** debe generar el build de producción:
            ```bash
            # Crear tag y build de producción
            git tag v1.0.0 && git push origin v1.0.0
            # El CI/CD generará automáticamente el build de producción
            ```

            > 📋 **Política del equipo:** Los builds de producción solo se generan al crear un tag Git (`v*`). Esto conserva nuestra cuota gratuita de EAS Build (50h/mes).

          # Update comment if it already exists (avoids duplicates)
          message-id: native-warning-${{ github.event.number }}

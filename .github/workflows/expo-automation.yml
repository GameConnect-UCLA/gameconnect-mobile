name: Expo CI/CD

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.changes.outputs.native }}
      js: ${{ steps.changes.outputs.js }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            native:
              - 'android/**'
              - 'app.json'
              - 'package.json'
              - 'package-lock.json'
              - 'eas.json'
            js:
              - 'app/**'
              - 'components/**'
              - 'hooks/**'
              - 'constants/**'
              - 'assets/**'
              - 'scripts/**'
              - '**/*.{js,ts,tsx,css,json}'

  pr-ota-update:
    needs: filter
    if: needs.filter.outputs.js == 'true' && needs.filter.outputs.native == 'false'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Update
        id: update
        run: |
          # Use preview channel for OTA as requested
          UPDATE_INFO=$(eas update --branch pr-${{ github.event.number }} --message "Update for PR #${{ github.event.number }}" --non-interactive --json)
          PREVIEW_URL=$(echo $UPDATE_INFO | jq -r '.[0].expoLink')
          DEEP_LINK=$(echo $UPDATE_INFO | jq -r '.[0].deepLink')
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "deeplink=$DEEP_LINK" >> $GITHUB_OUTPUT

      - name: Comment PR with QR
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            🚀 **EAS Update generado con éxito!**
            Puedes probar los cambios de este PR directamente en tu **Development Build** escaneando el código QR:

            ![QR Code](https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${{ steps.update.outputs.deeplink }})

            [Abrir actualización en el navegador](${{ steps.update.outputs.url }})

  pr-native-warning:
    needs: filter
    if: needs.filter.outputs.native == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Native changes warning
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ⚠️ **Cambios nativos detectados**
            Se han detectado cambios que afectan el código nativo (Android, package.json, app.json, etc.).

            **Importante:** No se genera ningún build automático para conservar el cuota de EAS Build. Después de hacer merge a `dev`, necesitarás generar un nuevo **Development Build (APK)** manualmente:

            ```bash
            # Opción 1: Build en la nube de EAS
            npm run build:dev

            # Opción 2: Build local (no consume cuota de EAS)
            eas build --profile development --platform android --local
            ```
